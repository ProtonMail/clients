[package]
name = "proton-core-db"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-sqlite3 = {path ="../proton-sqlite3"}
proton-api-core= {path ="../proton-api-core", features = ["sql"]}
aes-gcm = {workspace=true}
zeroize = {workspace=true}
uniffi = {workspace=true, optional = true}

[lints]
workspace = true

[features]
uniffi = ["dep:uniffi", "proton-api-core/uniffi"]
