[package]
name = "mail-search"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "Self-contained search engine for Proton Mail local search"

[features]
# Enable timing instrumentation for indexing operations (enabled via `mail-common/foundation_search_index_timing`)
foundation_search_index_timing = []

[dependencies]
# Core dependencies (always needed)
anyhow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
mail-task-service = { workspace = true }

# Database access (for intent/blob storage)
mail-stash = { workspace = true }
sqlite-watcher = { workspace = true }
flume = { workspace = true }

# Migration support
include_dir = { workspace = true }
mail-sqlite3 = { workspace = true }

# Message ID types
mail-api = { workspace = true }

# Content hashing for duplicate detection
sha2 = { workspace = true }
hex = { workspace = true }

flate2 = { workspace = true }

# Foundation Search engine
proton-foundation-search = { workspace = true }

# HTML-to-text for body indexing (lightweight stripper, no DOM)
mail-html-transformer = { path = "../mail-html-transformer" }

[lints]
workspace = true

[dev-dependencies]
test-case = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
