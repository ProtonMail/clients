[package]
name = "proton-sqlite3"
version = "0.2.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rusqlite = { version = "0.31.0", features = ["bundled", "modern_sqlite", "uuid", "chrono", "hooks", "functions"] }
tracing = "0.1"
thiserror = "1"
notify = { version = "6", default-features  = false, features = ["macos_fsevent"] }
log = "0.4.20"

[dev-dependencies]
rand = "0.8"
tempdir = "0.3"

[lints]
workspace = true

[features]
default = []
trace = ["rusqlite/trace"]
