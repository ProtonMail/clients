[package]
name = "proton-mail-tui"
version = "0.4.1"
edition.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# proton deps
proton-core-common = { workspace = true }
proton-mail-common = { workspace = true }
stash = { workspace = true }

# Tui deps
anyhow = "1"
chrono = { workspace = true }
crossterm = "0.28.1"
dirs = "5"
flume = { workspace = true }
futures = { workspace = true }
hex = "0.4"
html2text = { version = "0.13.2" }
log = "0.4.22"
ratatui = { version = "0.28.1", features = ["all-widgets"] }
scopeguard = "1.2"
secrecy = "0.8"
thiserror = "1"
throbber-widgets-tui = "0.7.1"
tokio = { workspace = true }
tracing = { workspace = true }
tracing-error = "0.2"
tracing-subscriber = { workspace = true }
tui-input = "0.10.1"
tui-logger = { version = "0.12.1", features = ["tracing-support"] }
tui-textarea = { version = "0.6.1", features = ["ratatui"] }
unicode-width = "0.1"

[target.'cfg(target_os="linux")'.dependencies]
keyring = { version = "3.0.3", features = ["linux-native"] }

[target.'cfg(target_os="macos")'.dependencies]
keyring = { version = "3.0.3", features = ["apple-native"] }


[lints]
workspace = true
