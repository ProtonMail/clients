[package]
name = "mail-labels-common"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "AGPL-3.0-only"

[dependencies]
derive_more = { workspace = true, features = ["try_from"] }
flume = { workspace = true }
futures = { workspace = true }
include_dir = { workspace = true }
itertools = { workspace = true }
mail-action-queue = { workspace = true }
mail-api-labels = { workspace = true }
mail-core-api = { workspace = true }
mail-shared-types = { workspace = true }
mail-sqlite3 = { workspace = true }
mail-stash = { workspace = true }
mail-local-id = { workspace = true }
rand = { workspace = true, optional = true }
serde = { workspace = true }
sqlite-watcher = { workspace = true }
thiserror = { workspace = true }
topological-sort = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
mail-core-api = { workspace = true, features = ["mocks"] }
pretty_assertions = { workspace = true }
rand = { workspace = true }
tokio = { workspace = true }

[features]
default = ["sql"]
sql = ["mail-core-api/sql"]
test-utils = ["dep:rand"]

[lints]
workspace = true
