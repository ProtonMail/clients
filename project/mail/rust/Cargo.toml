[workspace]
resolver = "2"
members = ["core/*", "mail/*", "xtask"]
package.edition = "2021"

[workspace.dependencies]

aes-gcm = { version = "0.10", features = ["zeroize", "std"] }
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
bitflags = { version = "2.5.0" }
bytes = "1.4"
clap = { version = "4.5.22", features = ["derive"] }
chrono = { version = "0.4", features = ["default", "serde"] }
color-backtrace = "0.6.1"
colored = "2.1.0"
ctor = "0.2.8"
flume = "0.11"
futures = "0.3.30"
ical = { version = "0.11", features = ["generator"] }
indoc = "2.0.5"
insta = { version = "1.39.0", features = ["toml"] }
itertools = "0.13.0"
html2text = "0.13.2"
lazy_static = "1"
mime = "0.3.17"
mockall = "0.12"
num_enum = "0.7.3"
oxilangtag = "0.1"
parking_lot = "0.12.3"
paste = "1"
pin-project = "1"
pretty_assertions = "1.4.0"
quick_cache = "0.6"
rand = "0.8"
regex = "1.10.5"
regex_static = "0.1"
rmp = "0.8"
rmp-serde = "1.1"
rusqlite = { version = "0.31.0", features = [
    "bundled",
    "chrono",
    "functions",
    "trace",
    "uuid",
] }
scraper = "0.19.0"
secrecy = { version = "0.8", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde-aux = "4.5"
serde_json = "1.0.117"
serde_repr = "0.1"
serde_with = "3.11.0"
smart-default = "0.7.1"
tempdir = "0.3.1"
tempfile = "3.10.1"
test-case = "3.3.1"
thiserror = "1.0.61"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
typed-builder = "0.20.0"
unicode-segmentation = "1.12.0"
uniffi = { version = "0.28.1", features = ["tokio"] }
url = { version = "2.5.2", features = ["serde"] }
uuid = { version = "1.8.0", features = ["serde", "v4"] }
velcro = "0.5.4"
wiremock = "0.6.0"
zeroize = "1.7.0"

[workspace.dependencies.proton-action-queue]
version = "0.7"
path = "core/action-queue"
registry = "proton"

[workspace.dependencies.proton-api-core]
version = "0.8"
path = "core/core-api"
registry = "proton"

[workspace.dependencies.proton-core-common]
version = "0.9"
path = "core/core-common"
registry = "proton"

[workspace.dependencies.proton-event-loop]
version = "0.7"
path = "core/event-loop"
registry = "proton"

[workspace.dependencies.proton-sqlite3]
version = "0.7"
path = "core/sqlite3"
registry = "proton"

[workspace.dependencies.proton-canonical-email]
version = "0.1"
path = "core/proton-canonical-email"
registry = "proton"

[workspace.dependencies.proton-vcard]
version = "0.2"
path = "core/vcard"
registry = "proton"

[workspace.dependencies.stash]
version = "0.2"
path = "core/stash"
registry = "proton"

[workspace.dependencies.stash-macros]
version = "0.2"
path = "core/stash-macros"
registry = "proton"

[workspace.dependencies.proton-api-mail]
version = "0.5"
path = "mail/mail-api"
registry = "proton"

[workspace.dependencies.proton-mail-common]
version = "0.8"
path = "mail/mail-common"
registry = "proton"

[workspace.dependencies.proton-mail-uniffi]
version = "0.12"
path = "mail/mail-uniffi"
registry = "proton"

[workspace.dependencies.proton-crypto-inbox]
version = "0.8.1"
registry = "proton"

[workspace.dependencies.proton-crypto-account]
version = "0.7.3"
registry = "proton"
features = ["sql"]

[workspace.dependencies.reqwest]
version = "0.11"
default-features = false
features = [
    "json",
    "deflate",
    "stream",
    "cookies",
    "multipart",
    "rustls",
    "rustls-tls",
    "socks",
]

[workspace.dependencies.proton-core-test-utils]
version = "0.1"
path = "core/core-test-utils"
registry = "proton"

[workspace.dependencies.proton-mail-test-utils]
version = "0.1"
path = "mail/mail-test-utils"
registry = "proton"

[workspace.lints.rust]
trivial_numeric_casts = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
trivial_casts = "warn"
unused_qualifications = "warn"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
# Useful to track missing comments on private items/code.
# missing_docs_in_private_items = "warn"
mut_mut = "warn"
#Disallow `println!`. Use `debug!` for debug output
# (which is provided by the `log` crate).
print_stdout = "warn"
unseparated_literal_suffix = "warn"
wrong_self_convention = "warn"
#TODO: Cargo build override rather than profile config(https://users.rust-lang.org/t/how-to-modify-profile-release-only-for-a-target/48811/3)

[profile.bench]
debug = true

[profile.release]
panic = "abort"

