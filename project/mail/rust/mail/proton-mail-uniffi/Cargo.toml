[package]
name = "proton-mail-uniffi"
version = "0.10.34"
edition = "2021"
publish = false

[lib]
crate-type = ["staticlib", "cdylib"]
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bytes = { workspace = true}
futures = { workspace = true }
proton-api-mail = { workspace = true }
proton-mail-common = { workspace = true }
proton-mail-message-detector = { workspace = true }
stash = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
uniffi = { workspace = true }

[dev-dependencies]
bytes = { workspace = true }
proton-api-mail = { workspace = true, features = ["integration_tests"] }
proton-mail-common = { path = "../proton-mail-common", features = ["uniffi"] }
proton-mail-message-detector = { path = "../proton-mail-message-detector" }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[lints]
workspace = true
