[workspace.dependencies.proton-crypto-inbox-mime]
version = "0.4.1"
path = "crypto/crypto-inbox-mime"
registry = "proton"

[workspace.dependencies.proton-crypto-account]
version = "0.10.1"
registry = "proton"
features = ["sql"]

[workspace.dependencies.proton-crypto]
version = "0.4.15"
registry = "proton"

[workspace.dependencies.proton-crypto-notifications]
version = "0.1"
path = "crypto/crypto-notifications"
