image: gitlab.protontech.ch:4567/rust/inbox/docker-images:rust

# sccache location to speed up compilation.
default:
  tags:
    - shared-medium
  cache: &global_cache
    key: sccache
    paths:
      - /tmp/cache


# Config git acccess to other repos
.script-config-git:
  script:
    - git config --global url.https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}.insteadOf https://${CI_SERVER_HOST}
    - git submodule update --init --recursive

stages:
  - lint
  - build


.do_fmt_check:
   script:
     - !reference [.script-config-git, script]
     - cargo fmt --check

.do_clippy_check:
   script:
     - !reference [.script-config-git, script]
     - cargo clippy -- -D warnings

format:
  stage: lint
  script:
    - !reference [.do_fmt_check, script]

clippy:
  stage: lint
  script:
    - !reference [.do_clippy_check, script]

build:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo build --release
    - cargo test

build-macos:
  tags:
    - inbox-tart
  image: "inbox-rust:1.75.0"
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo build --release
    - cargo test

build-mail-wasm:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cd proton-mail-wasm
    - wasm-pack build -d ./web_pkg
  artifacts:
    name: proton-mail-wasm
    paths:
      - proton-mail-wasm/web_pkg
    when: always
    expire_in: 4 hrs

build-ios:
  tags:
    - inbox-tart
  image: "inbox-rust:1.75.0"
  stage: build
  script:
    - !reference [.script-config-git, script]
    - rust-build/build_ios_framework_uniffi.sh proton-mail-uniffi proton-mail-uniffi/uniffi.toml /tmp/ios-framework

  artifacts:
    name: proton-mail-wasm
    paths:
      - proton-mail-wasm/web_pkg
    when: always
    expire_in: 4 hrs

build-mail-android:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cd proton-mail-uniffi
    - cargo ndk -t "armeabi-v7a" -t "arm64-v8a" -t "x86_64" build --release
    - uniffi-bindgen generate --library ../target/aarch64-linux-android/release/libproton_mail_uniffi.so --language kotlin --config uniffi.toml --out-dir bindings/proton-mail-uniffi/kotlin

