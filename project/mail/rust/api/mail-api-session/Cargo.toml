[package]
name = "mail-api-session"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "AGPL-3.0-only"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
cookie = { workspace = true }
derive_more = { workspace = true }
futures = { workspace = true }
mail-api-shared = { workspace = true }
mail-muon = { workspace = true }
mail-network-monitor-service = { workspace = true, features = ["muon"] }
mail-account-ids = { workspace = true }
mail-task-service = { workspace = true }
parking_lot = { workspace = true }
proton-crypto-account = { workspace = true, features = ["sql"] }
proton-crypto-subtle = { workspace = true, features = ["legacy"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_repr = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
mail-stash = { workspace = true, optional = true }
wiremock = { workspace = true, optional = true }
lattice = { workspace = true }
mail-api-lattice = { workspace = true }

[features]
default = []
mocks = ["dep:wiremock"]
sql = ["dep:mail-stash", "mail-account-ids/sql"]

[dev-dependencies]
mail-muon = { workspace = true, features = ["testing-server"] }

[lints]
workspace = true
