[package]
name = "proton-api-mail"
version = "0.3.0"
edition = "2021"
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
lazy_static = { workspace = true }
proton-api-core = { workspace = true }
serde = { version = "1.0.197", features = ["derive"] }
uniffi = { workspace = true, optional = true }

[dev-dependencies]
bytes = "1.6.0"
proton-async = { workspace = true }
reqwest = { version = "0.12.2", features = ["stream"] }
tracing-subscriber = { workspace = true }
wiremock = { workspace = true }

[features]
default = []
sql = ["proton-api-core/sql"]
uniffi = ["dep:uniffi", "proton-api-core/uniffi"]

[lints]
workspace = true