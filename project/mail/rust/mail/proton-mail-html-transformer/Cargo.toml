[package]
name = "proton-mail-html-transformer"
version = "0.2.0"
edition = "2021"

[dependencies]
# kuchikiki requires this verion of html5ever at this time.
html5ever = "=0.26"
kuchikiki = "=0.8.2"
lazy_static = { workspace = true }
thiserror = { workspace = true }
url = { workspace = true }
velcro = { workspace = true }

[lints]
workspace = true

[dev-dependencies]
cpuprofiler = "0.0.4"
criterion = "0.5.1"
insta = { version = "1.39.0", features = ["toml"] }
pprof = { version = "0.13.0", features = ["criterion", "flamegraph"] }

[profile.dev.package]
insta.opt-level = 3
similar.opt-level = 3

[[bench]]
name = "parsing_html"
harness = false

