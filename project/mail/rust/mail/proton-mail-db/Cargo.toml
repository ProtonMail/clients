[package]
name = "proton-mail-db"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-api-mail = { path="../proton-api-mail", features = ["sql"]}
proton-sqlite3 = {git =  "https://gitlab.protontech.ch/rust/proton-api-core.git"}
uuid = {version = "1.7", features = ["v4"]}

[dev-dependencies]
tracing-subscriber = "0.3"

[lints]
workspace = true
