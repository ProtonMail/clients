[package]
name = "proton-event-loop"
version = "0.2.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
proton-api-core = {git = "https://gitlab.protontech.ch/rust/proton-api-core.git"}
proton-async= {git = "https://gitlab.protontech.ch/rust/proton-api-core.git"}
uniffi = { version="0.26", optional = true }
paste = "1"

[dev-dependencies]
mockall = "0.12"

[features]
default=[]
uniffi=["proton-api-core/uniffi", "dep:uniffi"]

[lints]
workspace = true
