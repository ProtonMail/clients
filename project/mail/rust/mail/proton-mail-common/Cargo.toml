[package]
name = "proton-mail-common"
version = "0.2.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-core-common = {workspace=true}
proton-async= {workspace=true}
proton-api-mail = {path ="../proton-api-mail", features = ["sql"]}
proton-event-loop = {workspace=true}
proton-action-queue = {workspace=true}
uniffi = {optional = true, workspace=true}
proton-sqlite3 = {workspace=true}
uuid = {version = "1.7", features = ["v4"]}

[dev-dependencies]
lazy_static = {workspace=true}
wiremock = {workspace=true}
tempdir = "0.3.1"
# anotate your tests with traced_test attribute to see log outputs.
tracing-test = {version = "0.2.4" , features = ["no-env-filter"]}

[lints]
workspace = true

[features]
uniffi=["dep:uniffi", "proton-api-mail/uniffi", "proton-event-loop/uniffi", "proton-core-common/uniffi"]
