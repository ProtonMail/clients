[package]
edition = "2021"
rust-version = "1.85"
name = "pgp"
version = "0.16.0"
authors = ["dignifiedquire <dignifiedquire@gmail.com>"]
build = false
exclude = ["tests/tests/*"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "OpenPGP implementation in Rust"
homepage = "https://github.com/rpgp/rpgp"
readme = "README.md"
keywords = [
    "pgp",
    "gpg",
    "openpgp",
    "email",
    "encryption",
]
categories = [
    "cryptography",
    "email",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rpgp/rpgp"
resolver = "2"

[features]
asm = [
    "dep:sha1-asm",
    "sha1/asm",
    "sha2/asm",
    "md-5/asm",
]
bzip2 = ["dep:bzip2"]
