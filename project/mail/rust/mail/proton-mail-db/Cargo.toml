[package]
name = "proton-mail-db"
version = "0.2.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-api-mail = { path="../proton-api-mail", features = ["sql"]}
proton-sqlite3 = {workspace=true}
uuid = {version = "1.7", features = ["v4"]}

[dev-dependencies]
tracing-subscriber = "0.3"
lazy_static = "1"

[lints]
workspace = true
