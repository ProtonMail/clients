[package]
name = "proton-mail-wasm"
version = "0.1.0"
edition.workspace = true
publish = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
proton-mail-html-transformer = { version = "0.2.0", path = "../mail-html-transformer", registry = "proton" }
# Explicitly specified dependency with feature to enable wasm build.
# Cargo by default has addittive features, so by specifying it here, it will be also used everywhere in the dependency tree
getrandom = { version = "0.3", features = ["wasm_js"] }

[lints]
workspace = true
