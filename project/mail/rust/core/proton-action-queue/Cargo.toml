[package]
name = "proton-action-queue"
version = "0.5.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
chrono = { version = "0.4" }
log = "0.4.20"
proton-api-core = { workspace = true }
proton-sqlite3 = { workspace = true }
rmp = "0.8"
rmp-serde = "1.1"
serde = { version = "1.0.195", features = ["derive"] }
tracing = "0.1"
uuid = { version = "1.7", features = ["v4"] }

[dev-dependencies]
mockall = "0.12"
tempfile = "3"
tracing-subscriber = "0.3"
tracing-test = "0.2"

[lints]
workspace = true
