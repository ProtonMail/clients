[package]
name = "proton-core-api"
version = "0.8.1"
edition.workspace = true
rust-version.workspace = true
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
bitflags = { workspace = true }
chrono = { workspace = true }
cookie = { workspace = true }
derive_more = { workspace = true }
futures = { workspace = true }
muon = { workspace = true }
parking_lot = { workspace = true }
proton-crypto-account = { workspace = true }
proton-task-service = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_qs = { workspace = true }
serde_repr = { workspace = true }
serde_with = { workspace = true }
serde-aux = { workspace = true }
smart-default = { workspace = true }
stash = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
proton-network-monitor-service = { workspace = true, features = ["muon"] }

[dev-dependencies]
insta = { workspace = true }
proton-core-api = { path = ".", features = ["mocks"] }

[features]
default = []
sql = ["dep:stash"]
mocks = []

[lints]
workspace = true
