[package]
name = "proton-api-core"
version = "0.2.0"
edition = "2021"
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
thiserror = {workspace=true}
serde = {workspace=true}
serde_repr = {workspace=true}
serde_json = {workspace=true}
base64 = {workspace=true}
secrecy = {workspace=true}
anyhow = {workspace=true}
bytes = {workspace=true}
tracing = {workspace=true}
parking_lot = {workspace=true}
proton-crypto-account = {workspace=true}
uniffi = {workspace=true, optional = true}
proton-sqlite3 = {version = "0.4.3", path = "../proton-sqlite3", registry = "proton", optional = true}
reqwest = {workspace=true}
proton-async = {version = "0.3.0", path = "../proton-async", registry = "proton"}
serde-aux = {workspace=true}


[features]
default = []
uniffi = ["dep:uniffi"]
sql =["dep:proton-sqlite3"]

[dev-dependencies]
tokio = {workspace=true}
tracing-subscriber = {workspace=true}

[[example]]
name = "user_id"

[lints]
workspace = true
