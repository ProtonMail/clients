[package]
name = "proton-mail-labels"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]

[dependencies]
proton-api-mail = {path = "../proton-api-mail"}
proton-async= {git = "https://gitlab.protontech.ch/rust/proton-api-core.git"}
uniffi = { version="0.26", optional = true }
proton-event-loop = {path ="../proton-event-loop"}
lazy_static = "1"

[dev-dependencies]
mockall = "0.12"
env_logger = "0.10"
# overwirte tokio for signal feature
tokio = {version = "1", features = ["rt-multi-thread", "macros", "signal"]}
tracing-subscriber = "0.3"

[features]
uniffi=["proton-api-mail/uniffi", "dep:uniffi", "proton-event-loop/uniffi"]

[lints]
workspace = true
