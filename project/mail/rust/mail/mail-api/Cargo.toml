[package]
name = "proton-mail-api"
version = "0.5.0"
edition.workspace = true
rust-version.workspace = true
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
bitflags = { workspace = true, features = ["serde"] }
bytes = { workspace = true }
indexmap = { workspace = true }
muon = { workspace = true }
proton-account-api = { workspace = true }
proton-core-api = { workspace = true }
proton-crypto-inbox = { workspace = true }
proton-task-service = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_repr = { workspace = true }
serde_with = { workspace = true, features = ["base64"] }
smart-default = { workspace = true }
stash = { workspace = true, optional = true }

[dev-dependencies]
bytes = "1.9.0"
proton-core-api = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
test-case = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
wiremock = { workspace = true }
insta = { workspace = true }
proton-core-common = { workspace = true, features = ["test-utils"] }
proton-mail-api = { path = ".", features = ["mocks"] }
proton-log-service = { workspace = true }
tempfile = { workspace = true }
proton-issue-reporter-service = { workspace = true }


[lints]
workspace = true

[features]
default = []
sql = ["dep:stash", "proton-core-api/sql"]
mocks = []
