[package]
name = "mail-historic-ephemeral-load"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "AGPL-3.0-only"
description = "Ephemeral historic load: API metadata + bodies → Foundation Search (metadata rows only, no bodies)."
publish = false

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
mail-action-queue = { workspace = true }
mail-api = { workspace = true }
mail-common = { path = "../mail-common", default-features = true, features = [
  "foundation_search",
] }
mail-core-api = { workspace = true, features = ["sql"] }
mail-crypto-inbox = { workspace = true }
mail-html-transformer = { workspace = true }
mail-search = { workspace = true }
mail-stash = { workspace = true }
parking_lot = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
mail-action-queue = { workspace = true }
mail-api = { workspace = true, features = ["mocks"] }
mail-core-common = { workspace = true }
mail-task-service = { workspace = true }

[lints]
workspace = true
