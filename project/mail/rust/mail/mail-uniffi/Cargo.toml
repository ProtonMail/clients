[package]
name = "mail-uniffi"
version = "0.164.2"
edition.workspace = true
rust-version.workspace = true
publish = false
license.workspace = true

[lib]
crate-type = ["lib", "cdylib", "staticlib"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
derive_more = { workspace = true }
flume = { workspace = true }
futures = { workspace = true }
itertools = { workspace = true }
mail-muon = { workspace = true }
parking_lot = { workspace = true }
mail-account-api = { workspace = true }
mail-account-uniffi = { workspace = true }
mail-action-queue = { workspace = true }
mail-calendar-api-v1 = { workspace = true }
mail-calendar-common = { workspace = true }
mail-core-api = { workspace = true }
mail-core-common = { workspace = true }
proton-crypto-account = { workspace = true }
mail-crypto-inbox = { workspace = true }
core-event-loop = { workspace = true }
mail-api = { workspace = true }
mail-common = { workspace = true, features = ["proton_mail_error_log"] }
mail-observability = { workspace = true }
mail-telemetry = { workspace = true }
mail-task-service = { workspace = true }
mail-issue-reporter-service-uniffi = { workspace = true }
mail-ical = { workspace = true }
mail-vcard = { workspace = true }
mail-mailto = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
smart-default = { workspace = true }
mail-stash = { workspace = true }
mail-log-service = { workspace = true }
secrecy = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uniffi = { workspace = true }
mail-uniffi-common = { workspace = true }
mail-uniffi-macros = { workspace = true }
mail-uniffi-runtime = { workspace = true }
sqlite-watcher = { workspace = true }
non-empty-string = { workspace = true }
mail-network-monitor-service = { workspace = true }
url = { workspace = true }
zeroizing-alloc = { workspace = true }

[features]
default = []
# Foundation Search: Local body text search indexing
# When enabled, message bodies are indexed locally for offline full-text search.
foundation_search = ["mail-common/foundation_search"]
# Enable stdout logging for iOS (logs appear in Xcode console)
# Works in both debug and release builds
stdout_logging = []

[dev-dependencies]
mail-api = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[lints]
workspace = true
