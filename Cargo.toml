[workspace]
  members = [
    "project/account/rust/account*",
    "project/core/rust/core-*",
    "project/core/rust/lattice",
    "tools/uniffi-bindgen",
    # mail
    "project/mail/rust/account/*",
    "project/mail/rust/api/*",
    "project/mail/rust/calendar/*",
    "project/mail/rust/contacts/*",
    "project/mail/rust/core/*",
    "project/mail/rust/crypto/*",
    "project/mail/rust/mail/*",
    "project/mail/rust/shared/*",
    "project/mail/rust/uniffi/*",
  ]
  resolver = "3"

[workspace.package]
  edition = "2024"
  rust-version = "1.93.0"

[workspace.dependencies.account-crux]
  path = "project/account/rust/account-crux"
  features = ["facet_typegen"]

