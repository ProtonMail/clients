[package]
name = "mail-core-api"
version = "0.8.1"
edition.workspace = true
rust-version.workspace = true
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]
license.workspace = true

[dependencies]
contacts-api = { workspace = true }
core-feature-flags = { workspace = true }
mail-api-event-types = { workspace = true }
mail-api-labels = { workspace = true }
mail-api-shared = { workspace = true }
mail-proton-ids = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
bitflags = { workspace = true }
chrono = { workspace = true }
cookie = { workspace = true }
derive_more = { workspace = true }
futures = { workspace = true }
mail-muon = { workspace = true }
parking_lot = { workspace = true }
mail-api-utils = { workspace = true }
proton-crypto-account = { workspace = true }
mail-task-service = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_qs = { workspace = true }
serde_repr = { workspace = true }
serde_with = { workspace = true }
serde-aux = { workspace = true }
smart-default = { workspace = true }
mail-stash = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
mail-network-monitor-service = { workspace = true, features = ["muon"] }

[dev-dependencies]
insta = { workspace = true }
mail-core-api = { path = ".", features = ["mocks"] }

[features]
default = []
sql = [
  "dep:mail-stash",
  "contacts-api/sql",
  "mail-proton-ids/sql",
  "mail-api-event-types/sql",
  "mail-api-labels/sql",
]
mocks = [
  "contacts-api/mocks",
  "core-feature-flags/mocks",
  "mail-api-shared/mocks",
  "mail-api-event-types/mocks",
  "mail-api-labels/mocks",
]

[lints]
workspace = true
