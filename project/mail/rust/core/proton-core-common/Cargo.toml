[package]
name = "proton-core-common"
version = "0.3.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
aes-gcm = { workspace = true }
base64 = { workspace = true }
proton-api-core= { path = "../proton-api-core", version = "0.3.0", features = ["sql"], registry = "proton" }
proton-event-loop = { path = "../proton-event-loop", version = "0.6.0", registry = "proton" }
proton-sqlite3 = { path = "../proton-sqlite3", version = "0.6.0", registry = "proton" }
uniffi = { workspace = true, optional = true}
zeroize = { workspace = true }

[lints]
workspace = true

[features]
uniffi = ["proton-api-core/uniffi", "dep:uniffi", "proton-event-loop/uniffi"]
