[package]
name = "proton-api-mail"
version = "0.3.8"
edition = "2021"
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
proton-api-core = {workspace=true}
uniffi = {workspace=true, optional = true, features = ["tokio"]}
lazy_static = "1"
proton-crypto-inbox = {workspace= true}
bytes = {workspace= true}
serde = { version = "1.0.200", features = ["derive"] }

[dev-dependencies]
bytes = "1.6.0"
proton-async = {workspace=true}
reqwest = { version = "0.12.2", features = ["stream"] }
tracing-subscriber = {workspace=true, features = ["env-filter"]}
wiremock = "0.6.0"

[features]
default = []
uniffi = ["dep:uniffi", "proton-api-core/uniffi"]
sql =["proton-api-core/sql"]

[lints]
workspace = true