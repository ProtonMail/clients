[package]
name = "proton-sqlite3"
version = "0.6.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rusqlite = { version = "0.31.0", features = ["bundled", "modern_sqlite", "uuid", "chrono", "functions", "trace"] }
tracing = {workspace=true}
thiserror = {workspace=true}
notify = { version = "6", default-features  = false, features = ["macos_fsevent"], optional = true}
parking_lot = {workspace=true}
fixedbitset = "0.5"
slotmap = "1"
paste = {workspace=true}
proton-async = {version = "0.5.0", path = "../proton-async", registry = "proton"}
tokio = {workspace=true}

[dev-dependencies]
rand = {workspace=true}
tempdir = {workspace=true}
mockall = {workspace=true}

[lints]
workspace = true

[features]
default = []
notify= ["dep:notify"]

[[test]]
name = "main"
required-features = ["notify"]
