[package]
name = "proton-core-common"
version = "0.9.0"
edition.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
aes-gcm = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true, features = ["now", "alloc"] }
derive_more = { workspace = true, features = ["try_from"] }
email_address = { workspace = true }
indoc = { workspace = true }
flume = { workspace = true }
futures = { workspace = true }
ical = { workspace = true }
include_dir = { workspace = true }
num_enum = { workspace = true }
parking_lot = { workspace = true }
proton-api-core = { workspace = true, features = ["sql"] }
proton-action-queue = { workspace = true }
proton-crypto = { workspace = true }
proton-crypto-account = { workspace = true, features = ["sql"] }
proton-crypto-notifications = { workspace = true }
proton-crypto-pin-hash = { workspace = true }
proton-event-loop = { workspace = true }
proton-sqlite3 = { workspace = true }
proton-vcard = { workspace = true }
quick_cache.workspace = true
secrecy = { workspace = true }
serde = { workspace = true }
stash = { workspace = true }
test-case = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
unicode-segmentation = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }
zeroize = { workspace = true }
itertools = { workspace = true }
pretty_assertions = { workspace = true }
sqlite-watcher = { workspace = true }
tempfile = { workspace = true }
async_zip = { version = "0.0.15", features = ["deflate", "chrono"] }

[dev-dependencies]
futures = { workspace = true }
tempdir = { workspace = true }
wiremock = { workspace = true }
proton-core-test-utils = { workspace = true }
clap = { workspace = true }
rand = { workspace = true }

[lints]
workspace = true

[features]
default = ["sql"]
sql = ["proton-api-core/sql"]
