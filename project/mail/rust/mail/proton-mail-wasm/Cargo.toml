[package]
name = "proton-mail-wasm"
version = "0.1.0"
edition = "2021"
publish = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
proton-mail-message-detector= {path = "../proton-mail-message-detector"}
# We need to overwrite gerandom here to enable the JS feature when compiling for webassebly.
getrandom = {version = "0.2", features = ["js"]}


[lints]
workspace = true
