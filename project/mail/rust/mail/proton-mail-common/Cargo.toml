[package]
name = "proton-mail-common"
version = "0.5.8"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-core-common = {workspace=true}
proton-async= {workspace=true}
proton-api-mail = {version = "0.3",path ="../proton-api-mail", features = ["sql"], registry = "proton"}
proton-event-loop = {workspace=true}
proton-action-queue = {workspace=true}
uniffi = {optional = true, workspace=true}
proton-sqlite3 = {workspace=true}
uuid = {version = "1.7", features = ["v4"]}
proton-crypto-inbox = {workspace= true}
bytes = {workspace= true}

[dev-dependencies]
lazy_static = {workspace=true}
tempdir = "0.3.1"
# anotate your tests with traced_test attribute to see log outputs.
tracing-test = {version = "0.2.4" , features = ["no-env-filter"]}
velcro = "0.5.4"
wiremock = {workspace=true}
tempfile = "3.10.1"

# not compatible with global clippy configuration yet
# [lints]
# workspace = true

[features]
uniffi=["dep:uniffi", "proton-api-mail/uniffi", "proton-event-loop/uniffi", "proton-core-common/uniffi"]

# todo: remove when pedantic-ified and uncommend the [lints] section
[lints.clippy]
# those are also included in "pedantic" and can be removed from here when it's enabled globally
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
mut_mut = "warn"
# pedantic = "deny"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
# Useful to track missing comments on private items/code.
# missing_docs_in_private_items ="warn"
#Disallow `println!`. Use `debug!` for debug output
# (which is provided by the `log` crate).
print_stdout = "warn"
unseparated_literal_suffix = "warn"
wrong_self_convention = "warn"