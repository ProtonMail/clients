[workspace]
resolver = "2"

members = [
  "account/account-api",
  "account/account-common",
  "account/account-uniffi",
  "calendar/calendar-api",
  "calendar/calendar-common",
  "shared/action-queue",
  "core/core-api",
  "core/core-common",
  "core/event-loop",
  "shared/ical",
  "shared/ical-cli",
  "shared/ical-fuzz",
  "shared/ical-tz",
  "shared/log-service",
  "shared/proton-canonical-email",
  "shared/sqlite3",
  "shared/stash",
  "shared/stash-macros",
  "shared/task-service",
  "shared/vcard",
  "crypto/crypto-calendar",
  "crypto/crypto-inbox",
  "crypto/crypto-inbox-mime",
  "crypto/crypto-notifications",
  "crypto/crypto-pin-hash",
  "mail/mail-api",
  "mail/mail-common",
  "mail/mail-common-derive",
  "mail/mail-html-transformer",
  "mail/mail-tui",
  "mail/mail-uniffi",
  "payment/payment-crux",
  "payment/payment-sdk",
  "payment/payment-uniffi",
  "uniffi/uniffi-bindgen",
  "uniffi/uniffi-common",
  "uniffi/uniffi-macros",
  "uniffi/uniffi-runtime",
  "shared/proton-event-service",
  "shared/proton-network-monitor-service",
]

[workspace.package]
edition = "2024"
rust-version = "1.88.0"

[workspace.dependencies]
aes-gcm = { version = "0.10", features = ["zeroize", "std"] }
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
argon2 = { version = "0.5.3", features = ["default", "std"] }
bitflags = { version = "2.8.0" }
bytes = "1.9"
cfg-if = "1"
chrono = { version = "0.4", features = ["default", "serde"] }
clap = { version = "4.5.27", features = ["derive"] }
color-backtrace = "0.6.1"
common-multipart-rfc7578 = { version = "0.7.0", default-features = false }
cookie = "0.18.1"
criterion = "0.5.1"
derivative = "2.2.0"
non-empty-string = { version = "0.2.5", features = ["serde"] }
derive_more = { version = "2.0", features = ["full"] }
ext-php-rs = "0.13.1"
fancy-regex = "0.14.0"
fallible-iterator = "0.3"
flume = "0.11"
futures = "0.3.31"
function_name = "0.3.0"
futures-util = "0.3.31"
hex = "0.4.3"
ical = { version = "0.11", features = ["generator"] }
include_dir = { version = "0.7", features = ["glob"] }
indoc = "2.0.5"
insta = { version = "1.42.0", features = ["toml"] }
indexmap = { version = "2.7.1", features = ["serde"] }
itertools = "0.13.0"
html2text = "0.14.2"
jiff = { version = "0.2.4", features = ["serde"] }
file-format = { version = "0.26.0", features = ["reader"] }
mime = "0.3.17"
parking_lot = "0.12.3"
paste = "1"
pin-project = "1"
pretty_assertions = "1.4.1"
proc-macro2 = "1.0.93"
quote = "1.0.38"
syn = { version = "2.0.96", features = ["full"] }
rand = "0.8"
regex = "1.11.1"
rmp = "0.8"
rmp-serde = "1.3"
rusqlite = { version = "0.32.1", features = [
  "bundled",
  "chrono",
  "functions",
  "trace",
  "uuid",
] }
sqlite-watcher = { version = "0.5.1", features = ["rusqlite"] }
slotmap = "1.0.7"
secrecy = { version = "0.8", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde-aux = "4.5"
serde_json = "1.0.137"
serde_repr = "0.1"
serde_with = "3.12.0"
serde_qs = "0.13.0"
sha2 = "0.10.9"
smart-default = "0.7.1"
strum = "0.26.3"
tempdir = "0.3.7"
tempfile = "3.15.0"
test-case = "3.3.1"
thiserror = "1.0.69"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tynm = "0.1"
typed-builder = "0.20.0"
unicode-segmentation = "1.12.0"
uniffi_bindgen = "0.29"
uniffi_meta = "0.29"
uniffi = { version = "0.29.1", features = ["tokio"] }
url = { version = "2.5.4", features = ["serde"] }
utf8-width = "0.1.7"
uuid = { version = "1.12.1", features = ["serde", "v4"] }
velcro = "0.5.4"
walkdir = "2.5.0"
wiremock = "0.6.2"
wiremock-multipart = "1.0.1"
zeroize = { version = "1.8.1", features = ["zeroize_derive"] }
libfuzzer-sys = "0.4"
mockall = "0.13.1"
quick-xml = "0.38.2"
reqwest = { version = "0.12.23", features = [
  "rustls-tls",
], default-features = false }

[workspace.dependencies.email_address]
version = "0.2.9"
