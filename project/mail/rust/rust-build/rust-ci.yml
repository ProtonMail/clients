.script-config-git:
  script:
    - git config --global url.https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}.insteadOf https://${CI_SERVER_HOST}
    - git submodule update --init --recursive

.do_fmt_check:
   script:
     - !reference [.script-config-git, script]
     - cargo fmt --check

.do_clippy_check:
   script:
     - !reference [.script-config-git, script]
     - cargo clippy -- -D warnings

.do_gopenpgp_sys_check:
   script:
    - !reference [.script-config-git, script]
    - | 
      pattern=".*gopenpgp-sys (v[0-9]+\\.[0-9]+\\.[0-9]+).*"
      version=""
      cargo tree |
      while read -r line
      do  
          if [[ $line =~ $pattern ]]; then    
              echo "Found gopenpgp-sys ${BASH_REMATCH[1]}"
              if [ -z "$version" ]; then
                  version=${BASH_REMATCH[1]}
              fi
              if [ "${BASH_REMATCH[1]}" != "$version" ]; then
                  echo "Multiple gopenpgp-sys versions found ${version}, ${BASH_REMATCH[1]}"
                  echo "Multiple go runtimes can cause issues at app runtime."
                  echo "Please unify the gopenpgp-sys versions in the dependency tree."
                  exit 1
              fi
          fi
      done
