[package]
name = "proton-sqlite3"
version = "0.6.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
fixedbitset = "0.5"
notify = { version = "6", default-features  = false, features = ["macos_fsevent"], optional = true }
parking_lot = { workspace = true }
paste = { workspace = true }
proton-async = { workspace = true }
rusqlite = { version = "0.31.0", features = ["bundled", "modern_sqlite", "uuid", "chrono", "functions", "trace"] }
slotmap = "1"
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
mockall = { workspace = true }
rand = { workspace = true }
tempdir = { workspace = true }

[lints]
workspace = true

[features]
default = []
notify = ["dep:notify"]

[[test]]
name = "main"
required-features = ["notify"]
