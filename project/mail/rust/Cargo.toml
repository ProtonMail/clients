[workspace.lints.rust]
trivial_numeric_casts = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
trivial_casts = "warn"
unused_qualifications = "allow"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
# Useful to track missing comments on private items/code.
# missing_docs_in_private_items = "warn"
mut_mut = "warn"
#Disallow `println!`. Use `debug!` for debug output
# (which is provided by the `tracing` crate).
print_stdout = "warn"
unseparated_literal_suffix = "warn"
wrong_self_convention = "warn"
missing_panics_doc = "allow"
#TODO: Cargo build override rather than profile config(https://users.rust-lang.org/t/how-to-modify-profile-release-only-for-a-target/48811/3)

[profile.bench]
debug = true

[profile.dev.package]
insta.opt-level = 3
similar.opt-level = 3

[profile.release]
panic = "unwind"

# This profile gets about a 50% reduction in size compared to the default release profile.
[profile.small]
inherits = "release"
opt-level = "s"      # We might want to experiment with "z" instead.
# Move the debug info to a separate file.
# At the time of writing, this reduces the size of the binary by 9MB.
split-debuginfo = "packed"
lto = true                 # "Fat" LTO
incremental = false
# panic = 'abort' We might want to enable this

[patch."crates-io"]
# TODO https://github.com/hyperium/hyper/pull/3887 (got merged, waiting for release)
# TODO https://protonmail.slack.com/archives/C07FCLA1RQW/p1746692300139499
hyper = { git = "https://github.com/hyperium/hyper", rev = "436cadd1ac08a9508a46f550e03281db9f2fee97" }

# TODO(wpolak) Introduce a proper PR to the upstream with all the changes.
# * -webkit-text-fill-color support
# * parsing HEX colors without leading `#`
# * `Debug`, `Clone` and `Copy` for `PrinterOptions`
lightningcss = { git = "https://github.com/frondeus/lightningcss", rev = "b9dc136b0b43220381965e5806903e7c31a3ca12" }
