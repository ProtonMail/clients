[package]
name = "proton-sqlite3"
version = "0.4.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rusqlite = { version = "0.31.0", features = ["bundled", "modern_sqlite", "uuid", "chrono", "functions", "trace"] }
tracing = "0.1"
thiserror = "1"
notify = { version = "6", default-features  = false, features = ["macos_fsevent"], optional = true}
parking_lot = "0.12"
fixedbitset = "0.5"
slotmap = "1"
paste = "1"

[dev-dependencies]
rand = "0.8"
tempdir = "0.3"
mockall = "0.12"

[lints]
workspace = true

[features]
default = []
notify= ["dep:notify"]

[[test]]
name = "main"
required-features = ["notify"]
