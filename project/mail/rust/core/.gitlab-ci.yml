image: gitlab.protontech.ch:4567/rust/inbox/docker-images:rust

# sccache location to speed up compilation.
default:
  tags:
    - shared-medium
  cache: &global_cache
    key: sccache
    paths:
      - /tmp/cache

# Config git acccess to other repos
.script-config-git:
  script:
    - git config --global url.https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}.insteadOf https://${CI_SERVER_HOST}

stages:
  - lint
  - build

.do_fmt_check:
   script:
     - cargo fmt --check

.do_clippy_check:
   script:
     - !reference [.script-config-git, script]
     - cargo clippy -- -D warnings

format:
  stage: lint
  script:
    - !reference [.do_fmt_check, script]

clippy:
  stage: lint
  script:
    - !reference [.do_clippy_check, script]

build:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo build
    - cargo test

build-uniffi:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo build --features="uniffi"


build-android:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo ndk -t "armeabi-v7a" -t "arm64-v8a" -t "x86_64" build --release


build-macos:
  tags:
    - inbox-tart
  image: "inbox-rust:1.76.0"
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo build --release
    - cargo test

build-ios:
  tags:
    - inbox-tart
  image: "inbox-rust:1.76.0"
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo build --release --target --target x86_64-apple-ios
    - cargo build --release --target --target aarch64-apple-ios-sim
    - cargo build --release --target --target aarch64-apple-ios
