[package]
name = "mail-muon"
version = "1.7.1"

edition = "2021"
authors = [
  "Anthony Boulmier <anthony.boulmier@proton.ch>",
  "James Houlahan <james.houlahan@proton.ch>",
]
repository = "https://gitlab.protontech.ch/ProtonVPN/rust/muon"
documentation = "https://protonvpn.gitlab-pages.protontech.ch/rust/muon"

[features]
# --- Default ---
default = ["util", "http-proxy", "tls", "rt-async", "dns", "lenient"]

# --- Behavioral ---
lenient = ["lenient-time-constraint", "lenient-service-type"]
lenient-time-constraint = []
lenient-service-type = []
other-platform = []
other-product = []

# --- HTTP ---
http-proxy = []

# --- TLS ---
tls = ["tls-rustls", "tls-tokio-rustls", "tls-pinning"]
tls-rustls = ["dep:futures-rustls", "dep:rustls-platform-verifier", "dep:jni"]
tls-tokio-rustls = ["dep:tokio", "dep:tokio-rustls", "dep:rustls-native-certs"]
tls-tokio-native = ["dep:tokio", "dep:tokio-native-tls", "dep:openssl"]
tls-pinning = []

# --- DNS ---
dns = ["dns-client", "doh-client"]
dns-client = ["dep:hickory-client", "dep:hickory-proto", "dep:async-io"]
doh-client = ["dep:hickory-proto"]

# --- Runtime ---
rt-async = [
  "dep:async-net",
  "dep:async-io",
  "dep:async-channel",
  "dep:async-executor",
  "dep:num_cpus",
]
rt-tokio = ["dep:tokio"]

# --- Testing ---
unsealed = []
doctest = []

# Test support
testing = ["dep:anyhow", "dep:tempfile", "dep:regex", "dep:totp-rs"]
testing-server = [
  "testing",
  "unsealed",
  "tls",
  "dep:async-channel",
  "dep:axum",
  "dep:rcgen",
  "dep:tokio",
  "dep:tokio-rustls",
  "dep:tower",
  "dep:hyper-util",
  "dep:uuid",
]
testing-runner = ["testing", "testing-server", "tokio/rt-multi-thread"]
testing-tinyproxy = ["testing"]

# Enables various tests
test-atlas = ["testing"]
test-dns = ["testing", "dns-client"]
test-doh = ["testing", "doh-client"]
test-local = ["testing", "testing-runner"]
test-proxy = ["testing", "testing-tinyproxy"]

ffi = []
util = ["dep:data-encoding", "dep:num"]

[target.'cfg(not(target_family = "wasm"))'.dependencies]
openssl = { version = "*", features = ["vendored"], optional = true }
async-channel = { version = "2.3", optional = true }
async-executor = { version = "1.12", optional = true }
async-io = { version = "2.3", optional = true }
async-net = { version = "2.0", optional = true }
futures-rustls = { version = "0.26", default-features = false, features = [
  "ring",
  "tls12",
], optional = true }
futures-timer = { version = "3.0" }
hickory-client = { version = "0.25", default-features = false, optional = true }
num_cpus = { version = "1.16", optional = true }
rustls-platform-verifier = { version = "0.6", optional = true }
tokio = { version = "1.50", features = [
  "fs",
  "macros",
  "net",
  "rt",
], optional = true }
tokio-rustls = { version = "0.26.4", optional = true }
tokio-native-tls = { version = "0.3", optional = true }
rustls-native-certs = { version = "0.8.3", optional = true }
h2 = { version = "*" }
hyper = { version = "1.3", features = ["client", "http1", "http2"] }
hyper-util = { version = "0.1", features = ["service"], optional = true }
tower = { version = "0.4", optional = true }
uuid = { version = "1.8", features = ["v4"], optional = true }
rcgen = { version = "0.13", optional = true }
axum = { version = "0.7", optional = true }

[target.'cfg(not(target_family = "wasm"))'.dev-dependencies]
tokio = { version = "1.50", features = ["fs", "macros", "net", "rt"] }
tempfile = "3.10"


[target.'cfg(target_family = "wasm")'.dependencies]
reqwest = { version = "0.12" }
getrandom = { version = "0.2", features = ["js"] }
futures-timer = { version = "3.0", features = ["wasm-bindgen"] }

[target.'cfg(target_family = "wasm")'.dev-dependencies]
wasm-bindgen-test = "0.3"

[target.'cfg(target_os = "android")'.dependencies]
jni = { version = "0.21", optional = true }


[dependencies]
anyhow = { version = "1.0", optional = true }
async-lock = { version = "3.3" }
async-trait = "0.1"
bytes = "1.6"
cfg-if = "1.0"
ctor = "0.2"
data-encoding = { version = "2.6", optional = true }
futures = "0.3"
http = "1.1"
http-body = "1.0"
itertools = "0.13"
lazy_static = "1.4"
num = { version = "0.4", optional = true }
pin-project = "1.1"
rand = "0.8"
totp-rs = { version = "5.5", optional = true }
regex = { version = "1.10", optional = true }
rustls-pemfile = { version = "2.1.3", optional = true }
semver = "1.0"
serde_json = "1.0"
serde_qs = "0.13"
serde_repr = "0.1"
sha2 = "0.10"
tempfile = { version = "3.10", optional = true }
common-multipart-rfc7578 = { version = "0.7", default-features = false }
thiserror = "1.0"
url = "2.5"
x509-parser = "0.16"
muon-proc = { version = "0.5", registry = "proton" }
tracing = { version = "0.1", features = ["log"] }
derive_more = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }

hickory-proto = { version = "0.25", default-features = false, optional = true }


[dependencies.proton-srp]
git = "https://github.com/ProtonMail/proton-crypto-rs.git"
rev = "33d22de54c578408108f580d6cafae06f656da9a"

[build-dependencies]
anyhow = "1.0"
bindgen = "0.69"
camino = { version = "1.1", features = ["serde1"] }
derive_more = { version = "1.0", features = ["full"] }
lazy_static = "1.4"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
env_logger = "0.11"
mail-muon = { path = ".", features = ["testing", "unsealed"] }
anyhow = "1.0"
test-case = "3"
tokio-test = "0.4.4"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

[lints.clippy]
all = "deny"

[lints.rust]
missing_debug_implementations = "deny"
missing_docs = "deny"

[lints.rustdoc]
broken_intra_doc_links = "deny"

[lints.rust.unexpected_cfgs]
level = "deny"

check-cfg = [
  # Set by the CI, used to disable tests that can't run in the CI
  "cfg(ci)",

  # Set this to build the go-crypto lib as a DLL instead of as a static library
  "cfg(crypto_dll)",

  # Set this to enable VCS stamping of the go-crypto lib
  "cfg(crypto_vcs)",
]
