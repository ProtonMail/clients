[package]
name = "mail-tui"
version = "0.4.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
crossterm = { version = "0.28.1", features = ["event-stream"] }
copypasta = "0.10.2"
dirs = "5"
flume = { workspace = true }
futures = { workspace = true }
itertools = { workspace = true }
log = "0.4.25"
mail-account-api = { workspace = true }
mail-action-queue = { workspace = true }
mail-calendar-api-v1 = { workspace = true }
mail-calendar-common = { workspace = true }
mail-core-common = { workspace = true }
mail-crypto-inbox = { workspace = true }
mail-api = { workspace = true }
mail-common = { workspace = true }
mail-html-transformer = { workspace = true }
mail-issue-reporter-service = { workspace = true }
mail-log-service = { workspace = true, features = ["non_blocking"] }
ratatui = { version = "0.28.1", features = ["all-widgets", "unstable"] }
ratatui-explorer = { version = "=0.1.2", features = ["crossterm"] }
secrecy = { workspace = true }
sqlite-watcher = { workspace = true }
mail-stash = { workspace = true }
throbber-widgets-tui = "0.7.1"
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-appender = { workspace = true }
tracing-subscriber = { workspace = true }
tui-input = "0.10.1"
tui-logger = { version = "0.12.1", features = ["tracing-support"] }
tui-textarea = { version = "0.6.1", features = ["ratatui"] }
qrcode = "0.14.1"
mail-network-monitor-service = { workspace = true }
zeroizing-alloc = { workspace = true }

[target.'cfg(target_os="linux")'.dependencies]
keyring = { version = "3.6.1", features = ["linux-native"] }

[target.'cfg(target_os="macos")'.dependencies]
keyring = { version = "3.6.1", features = ["apple-native"] }

[lints]
workspace = true
