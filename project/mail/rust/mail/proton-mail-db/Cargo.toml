[package]
name = "proton-mail-db"
version = "0.3.2"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-api-mail = { path="../proton-api-mail", features = ["sql"]}
proton-sqlite3 = {workspace=true}
uuid = {version = "1.7", features = ["v4"]}
uniffi = {workspace=true, optional = true}

[dev-dependencies]
tracing-subscriber = {workspace=true}
lazy_static = {workspace=true}

[lints]
workspace = true

[features]
uniffi= ["dep:uniffi", "proton-api-mail/uniffi"]
