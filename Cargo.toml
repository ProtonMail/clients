[patch.proton]
mail-muon = { path = "project/mail/rust/forks/muon" }

[workspace.lints.rust]
  unexpected_cfgs = { level = "warn", check-cfg = ["cfg(forcego)"] }

[workspace.lints.clippy]
  all = "deny"

[workspace.lints.rustdoc]
  private_intra_doc_links = "allow"
  broken_intra_doc_links = "deny"

[profile.android]
  inherits = "release"
  panic = "abort"
  # Strip symbols from binary.
  strip = true
  # Optimize for binary size, but also turn off loop vectorization.
  opt-level = "z"
  lto = true
  incremental = false
  codegen-units = 1

[profile.mail-android]
  inherits = "release"
  panic = "abort"
  opt-level = "s"
  lto = true
  incremental = false
  codegen-units = 1

[profile.mail-ios]
  inherits = "release"
  panic = "abort"
  opt-level = "s"
  codegen-units = 1

[profile.mail-ios-debug]
  inherits = "dev"
  debug = true

[profile.mail-small]
  inherits = "release"
  split-debuginfo = "packed"
  lto = true
  incremental = false

[profile.mail-darwin-test]
  inherits = "dev"
  debug = false
  incremental = false

[profile.bench]
  debug = true

[profile.dev.package]
  insta.opt-level = 3
  similar.opt-level = 3

[profile.release]
  panic = "unwind"
