image: gitlab.protontech.ch:4567/rust/inbox/docker-images:rust

# sccache location to speed up compilation.
default:
  tags:
    - shared-medium
  cache: &global_cache
    key: sccache
    paths:
      - /tmp/cache


# Config git acccess to other repos
.script-config-git:
  script:
    - git config --global url.https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}.insteadOf https://${CI_SERVER_HOST}

stages:
  - lint
  - build


.do_fmt_check:
   script:
     - cargo fmt --check

.do_clippy_check:
   script:
     - !reference [.script-config-git, script]
     - cargo clippy -- -D warnings

format:
  stage: lint
  script:
    - !reference [.do_fmt_check, script]

clippy:
  stage: lint
  script:
    - !reference [.do_clippy_check, script]

build:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cargo build
    - cargo test

build-mail-md-wasm:
  stage: build
  script:
    - !reference [.script-config-git, script]
    - cd proton-mail-md
    - wasm-pack build -d ./web_pkg --target web --features="web"
  artifacts:
    name: proton-mail-md-wasm
    paths:
      - proton-mail-md/web_pkg
    when: always
    expire_in: 4 hrs
