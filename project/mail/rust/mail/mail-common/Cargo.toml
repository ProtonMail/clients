[package]
name = "proton-mail-common"
version = "0.8.0"
edition.workspace = true
rust-version.workspace = true

[features]
default = ["sql", "events-v6"]
gtk = []
test-utils = [
  "dep:wiremock",
  "dep:function_name",
  "dep:tempfile",
  "dep:tracing-subscriber",
  "dep:velcro",
  "dep:wiremock-multipart",
  "proton-core-common/test-utils",
]

sql = [
  "proton-core-api/sql",
  "proton-mail-api/sql",
  "proton-core-api/mocks",
  "proton-mail-api/mocks",
]
proton_mail_error_log = []
events-v6 = ["proton-core-common/events-v6"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
proton-log-service = { workspace = true }
proton-observability = { workspace = true }
bitflags = { workspace = true }
bytes = { workspace = true }
cfg-if = { workspace = true }
derivative = { workspace = true }
email_address = { workspace = true }
non-empty-string = { workspace = true }
chrono = { workspace = true }
derive_more = { workspace = true, features = ["try_from"] }
file-format = { workspace = true }
flume = { workspace = true }
futures = { workspace = true }
indoc = { workspace = true }
include_dir = { workspace = true }
itertools = { workspace = true }
jiff = { workspace = true }
mime = { workspace = true }
parking_lot = { workspace = true }
proton-action-queue = { workspace = true }
proton-account-api = { workspace = true }
proton-calendar-api = { workspace = true }
proton-calendar-common = { workspace = true }
proton-core-api = { workspace = true, features = ["sql"] }
proton-mail-api = { workspace = true, features = ["sql"] }
proton-canonical-email = { workspace = true }
proton-core-common = { workspace = true }
proton-crypto-account = { workspace = true }
proton-crypto-inbox = { workspace = true }
proton-event-loop = { workspace = true }
proton-mail-html-transformer = { workspace = true }
proton-sqlite3 = { workspace = true }
proton-task-service = { workspace = true }
proton-mail-common-derive = { workspace = true }
proton-mailto = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
secrecy = { workspace = true }
smart-default = { workspace = true }
stash = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
typed-builder = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }
sqlite-watcher = { workspace = true }
reqwest = { workspace = true }
proton-issue-reporter-service = { workspace = true }

# test-util option deps
function_name = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }
wiremock = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
velcro = { workspace = true, optional = true }
wiremock-multipart = { workspace = true, optional = true }
proton-network-monitor-service = { workspace = true }

[dev-dependencies]
clap = { workspace = true }
color-backtrace = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
proton-calendar-api = { workspace = true, features = ["test-utils"] }
proton-core-api = { workspace = true }
proton-crypto-calendar = { workspace = true }
proton-ical = { workspace = true }
proton-mail-api = { workspace = true }
secrecy = { workspace = true }
serde_with = { workspace = true }
test-case = { workspace = true }
tracing-subscriber = { workspace = true }
function_name = { workspace = true }
#tracing-test = { version = "0.2.4", features = ["no-env-filter"] }
tempfile = { workspace = true }
velcro = { workspace = true }
wiremock = { workspace = true }
proton-mail-common = { path = ".", features = ["test-utils"] }
criterion = { workspace = true }
pprof = { workspace = true }

# not compatible with global clippy configuration yet
# [lints]
# workspace = true

# todo: remove when pedantic-ified and uncommend the [lints] section
[lints.clippy]
# those are also included in "pedantic" and can be removed from here when it's enabled globally
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
mut_mut = "warn"
# pedantic = "deny"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
# Useful to track missing comments on private items/code.
# missing_docs_in_private_items ="warn"
#Disallow `println!`. Use `debug!` for debug output
# (which is provided by the `log` crate).
print_stdout = "warn"
unseparated_literal_suffix = "warn"
wrong_self_convention = "warn"

[[bench]]
name = "messages_load"
harness = false
required-features = []
