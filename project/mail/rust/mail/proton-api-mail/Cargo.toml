[package]
name = "proton-api-mail"
version = "0.3.13"
edition = "2021"
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
bitflags = { workspace = true }
bytes = { workspace = true }
indoc = { workspace = true }
lazy_static = { workspace = true }
proton-api-core = { workspace = true }
proton-crypto-inbox = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_repr = { workspace = true }
serde_with = "3.8.1"
smart-default = { workspace = true }
stash = { workspace = true }
thiserror = "1"
tokio = { workspace = true }
tracing = { workspace = true }
velcro = { workspace = true }

[dev-dependencies]
bytes = "1.6.0"
proton-api-core = { workspace = true, features = ["integration_tests"] }
proton-api-mail = { workspace = true, features = ["integration_tests"] }
reqwest = { version = "0.12.2", features = ["stream"] }
tracing-subscriber = { workspace = true }
wiremock = { workspace = true }

[features]
default = []
integration_tests = []

[lints]
workspace = true
