[package]
name = "proton-core-common"
version = "0.9.0"
edition.workspace = true
rust-version.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
aes-gcm = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
bitflags = { workspace = true }
chrono = { workspace = true, features = ["now", "alloc"] }
derive_more = { workspace = true, features = ["try_from"] }
email_address = { workspace = true }
indoc = { workspace = true }
flume = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
ical = { workspace = true }
include_dir = { workspace = true }
indexmap = { workspace = true }
parking_lot = { workspace = true }
proton-core-api = { workspace = true, features = ["sql"] }
proton-api-utils = { workspace = true }
proton-action-queue = { workspace = true }
proton-crypto = { workspace = true }
proton-crypto-account = { workspace = true, features = ["sql"] }
proton-crypto-notifications = { workspace = true }
proton-crypto-pin-hash = { workspace = true }
proton-event-loop = { workspace = true }
proton-log-service = { workspace = true }
proton-task-service = { workspace = true }
proton-sqlite3 = { workspace = true }
proton-vcard = { workspace = true }
secrecy = { workspace = true }
proton-event-service = { workspace = true }
proton-issue-reporter-service = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
smart-default = { workspace = true }
stash = { workspace = true }
test-case = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
unicode-segmentation = { workspace = true }
zeroize = { workspace = true }
itertools = { workspace = true }
pretty_assertions = { workspace = true }
sqlite-watcher = { workspace = true }
async_zip = { version = "0.0.15", features = ["deflate", "chrono"] }
walkdir = { workspace = true }
wiremock = { workspace = true, optional = true }
function_name = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
jiff = { workspace = true }
url = { workspace = true }
proton-network-monitor-service = { workspace = true, features = ["muon"] }
proton-observability = { workspace = true }
topological-sort = { workspace = true }

[dev-dependencies]
futures = { workspace = true }
tempfile = { workspace = true }
rand = { workspace = true }
insta = { workspace = true }
proton-core-common = { path = ".", features = ["test-utils"] }

[lints]
workspace = true

[features]
default = ["sql"]
sql = ["proton-core-api/sql"]
test-utils = [
  "dep:wiremock",
  "dep:function_name",
  "dep:tempfile",
  "dep:rand",
  "proton-core-api/mocks",
]
action_rebase = ["proton-action-queue/rebase"]
