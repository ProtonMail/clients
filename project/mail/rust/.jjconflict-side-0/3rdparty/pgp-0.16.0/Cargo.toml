    "dep:ml-kem",
    "dep:ml-dsa",
    "dep:slh-dsa",
]
wasm = [
    "chrono/wasmbind",
    "getrandom",
    "getrandom/js",
]

[lib]
name = "pgp"
crate-type = [
    "cdylib",
    "rlib",
]
path = "src/lib.rs"
bench = false

[[test]]
