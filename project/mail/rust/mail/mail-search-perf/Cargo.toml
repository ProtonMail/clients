[package]
name = "mail-search-perf"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "AGPL-3.0-only"
description = "Search performance instrumentation (prefetch timing) for mail."

[dependencies]
aes-gcm = { workspace = true }
base64 = { workspace = true }
flate2 = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
# Match mail-common defaults for ergonomics: examples use `required-features = ["foundation_search"]`.
default = ["foundation_search"]
foundation_search = []
foundation_search_index_timing = []

[dev-dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true }
mail-api = { workspace = true }
mail-common = { workspace = true, features = [
  "foundation_search",
  "foundation_search_index_timing",
] }
mail-core-api = { workspace = true }
mail-core-common = { workspace = true, features = ["test-utils"] }
mail-stash = { workspace = true }
mail-historic-ephemeral-load = { workspace = true }
mail-issue-reporter-service = { workspace = true }
mail-log-service = { workspace = true }
mail-task-service = { workspace = true }
mail-search = { workspace = true, features = [
  "foundation_search_index_timing",
] }
mail-html-transformer = { workspace = true }
mail-crypto-inbox = { workspace = true }
mail-action-queue = { workspace = true }
chrono = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["signal"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[lints]
workspace = true

[[example]]
name = "historic_load_test"
required-features = ["foundation_search"]

[[example]]
name = "search_query"
required-features = ["foundation_search"]
