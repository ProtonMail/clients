[package]
name = "proton-mail-common"
version = "0.2.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-core-common = {workspace=true}
proton-async= {workspace=true}
proton-mail-db = {path ="../proton-mail-db"}
proton-api-mail = {path ="../proton-api-mail"}
proton-event-loop = {workspace=true}
proton-action-queue = {workspace=true}
uniffi = {optional = true, workspace=true}
uuid = { version= "1" , features = ["v4"] }

[dev-dependencies]
bytes = "1.6.0"
reqwest = { version = "0.12.2", features = ["stream"] }
tokio = "1.37.0"
wiremock = "0.6.0"

[lints]
workspace = true

[features]
uniffi=["dep:uniffi", "proton-api-mail/uniffi", "proton-event-loop/uniffi", "proton-core-common/uniffi", "proton-mail-db/uniffi"]
