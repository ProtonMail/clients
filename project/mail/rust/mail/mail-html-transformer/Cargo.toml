[package]
name = "proton-mail-html-transformer"
version = "0.2.3"
edition.workspace = true
rust-version.workspace = true

[dependencies]
# kuchikiki requires this verion of html5ever at this time.
html5ever = "=0.26"
kuchikiki = "=0.8.2"
thiserror = { workspace = true }
url = { workspace = true }
velcro = { workspace = true }
tracing = { workspace = true }
itertools = { workspace = true }
regex = { workspace = true }
lightningcss = { version = "1.0.0-alpha.66", features = [
  "visitor",
], default-features = false }
html2text = { workspace = true }
email_address = { workspace = true }

[lints]
workspace = true

[dev-dependencies]
# The code related to cpuprofiler usage has been commented, we can remove the import for now
# cpuprofiler = "0.0.4"
insta = { workspace = true }
criterion = "0.5.1"
pprof = { version = "0.13.0", features = ["criterion", "flamegraph"] }
velcro = { workspace = true }
pretty_assertions = { workspace = true }
indoc = { workspace = true }
test-case = { workspace = true }

[[bench]]
name = "parsing_html"
harness = false
