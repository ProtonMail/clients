[package]
name = "proton-api-mail"
version = "0.1.0"
edition = "2021"
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
proton-api-core = {workspace=true}
uniffi = {version = "0.26", optional = true, features = ["tokio"]}


[dev-dependencies]
proton-async = {workspace=true}
tracing-subscriber = {workspace=true, features = ["env-filter"]}

[features]
default = []
uniffi = ["dep:uniffi", "proton-api-core/uniffi"]
sql =["proton-api-core/sql"]

[lints]
workspace = true
