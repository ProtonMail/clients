[package]
name = "proton-mail-labels"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]

[dependencies]
proton-api-rs = {git = "https://gitlab.protontech.ch/rust/inbox/network.git"}
proton-async= {git = "https://gitlab.protontech.ch/rust/inbox/network.git"}
uniffi = { version="0.25", optional = true ,features = ["tokio"]}
proton-event-loop = {path ="../proton-event-loop"}

[dev-dependencies]
mockall = "0.12"
env_logger = "0.10"
# overwirte tokio for signal feature
tokio = {version = "1", features = ["rt-multi-thread", "macros", "signal"]}

[features]
uniffi=["proton-api-rs/ffi", "dep:uniffi", "proton-event-loop/uniffi"]

[lints]
workspace = true
