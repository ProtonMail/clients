[package]
name = "proton-sqlite3"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rusqlite = { version = "0.30", features = ["bundled", "modern_sqlite", "uuid", "chrono", "hooks"] }
tracing = "0.1"
thiserror = "1"

[dev-dependencies]
rand = "0.8"
tempdir = "0.3"

[lints]
workspace = true
