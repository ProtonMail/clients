[package]
name = "mail-historic-search-load"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "AGPL-3.0-only"
description = "Historic search load scaffolding: bulk fetch/index orchestration and synthetic local id minting for perf/historic paths."

[features]
default = []
# Perf lab harness (remote/local bodies). `foundation_search` is always enabled via `mail-common` dep.
foundation_search_lab_harness = [
  "mail-common/foundation_search_lab_harness",
  "dep:mail-crypto-inbox",
  "dep:mail-html-transformer",
  "dep:mail-search",
  "dep:mail-search-perf",
]

[dependencies]
mail-action-queue = { workspace = true }
mail-common = { path = "../mail-common", default-features = true, features = [
  "foundation_search",
] }
mail-api = { workspace = true, features = ["sql"] }
mail-core-api = { workspace = true, features = ["sql"] }
mail-core-common = { workspace = true }
mail-stash = { workspace = true }
mail-crypto-inbox = { workspace = true, optional = true }
mail-html-transformer = { workspace = true, optional = true }
mail-search = { workspace = true, optional = true }
mail-search-perf = { workspace = true, optional = true }
futures = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true }

[lints]
workspace = true
