[package]
name = "proton-core-common"
version = "0.5.11"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
aes-gcm = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
futures = { workspace = true }
proton-api-core = { workspace = true, features = ["sql"] }
proton-crypto-account = { workspace = true }
proton-event-loop = { workspace = true }
proton-sqlite3 = { workspace = true }
secrecy = { workspace = true }
serde = { workspace = true }
stash = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uniffi = { workspace = true, optional = true }
zeroize = { workspace = true }

[dev-dependencies]
tempdir = {workspace=true}
wiremock = {workspace=true}

[lints]
workspace = true

[features]
uniffi = ["proton-api-core/uniffi", "dep:uniffi", "proton-event-loop/uniffi"]
