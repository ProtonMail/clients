[package]
name = "proton-mail-html-transformer"
version = "0.2.3"
edition.workspace = true
rust-version.workspace = true

[dependencies]
# kuchikiki requires this verion of html5ever at this time.
html5ever = "=0.26"
kuchikiki = "=0.8.2"
thiserror = { workspace = true }
url = { workspace = true }
velcro = { workspace = true }
tracing = { workspace = true }
itertools = { workspace = true }
regex = { workspace = true }
# TODO(wpolak) Introduce a proper PR to the upstream with all the changes.
# * -webkit-text-fill-color support
# * parsing HEX colors without leading `#`
# * `Debug`, `Clone` and `Copy` for `PrinterOptions`
lightningcss = { git = "https://github.com/frondeus/lightningcss", rev = "b9dc136b0b43220381965e5806903e7c31a3ca12", features = [
  "visitor",
], default-features = false }
html2text = { workspace = true }
email_address = { workspace = true }

[lints]
workspace = true

[dev-dependencies]
# The code related to cpuprofiler usage has been commented, we can remove the import for now
# cpuprofiler = "0.0.4"
insta = { workspace = true }
criterion = { workspace = true }
pprof = { workspace = true }
velcro = { workspace = true }
pretty_assertions = { workspace = true }
indoc = { workspace = true }
test-case = { workspace = true }

[[bench]]
name = "parsing_html"
harness = false
