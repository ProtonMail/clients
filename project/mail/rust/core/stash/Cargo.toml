# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
flume = { workspace=true }
indoc = { workspace=true }
r2d2 = "0.8.10"
r2d2_sqlite = { version="0.24.0", features = ["bundled"] }
