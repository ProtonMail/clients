[package]
name = "proton-mail-tui"
version = "0.3.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
dirs = "5"
anyhow = "1"
thiserror = "1"
crossterm = "0.27.0"
ratatui = { version = "0.26.1", features = ["all-widgets"] }
secrecy = "0.8"
log = "0.4"
tui-input = "0.8"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
tracing-error = "0.2"
keyring = "2.3"
hex = "0.4"
tui-logger = { version = "0.11", features = ["tracing-support"] }
unicode-width = "0.1"
chrono = { version = "0.4" }

[dependencies.proton-async]
#path = "../../proton-api-core/proton-async"
registry = "proton"
version = "0.5"

[dependencies.proton-core-common]
version = "0.5.2"
registry = "proton"
#path = "../../proton-api-core/proton-core-common"

[dependencies.proton-mail-common]
#path = "../mail/proton-mail-common"
version = "0.5.5"
registry = "proton"

[lints.rust]
trivial_numeric_casts = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
trivial_casts = "warn"
unused_qualifications = "warn"

[lints.clippy]
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
# Useful to track missing comments on private items/code.
# missing_docs_in_private_items ="warn"
mut_mut = "warn"
#Disallow `println!`. Use `debug!` for debug output
# (which is provided by the `log` crate).
print_stdout = "warn"
unseparated_literal_suffix = "warn"
wrong_self_convention = "warn"
