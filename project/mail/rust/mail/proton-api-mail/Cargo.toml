[package]
name = "proton-api-mail"
version = "0.3.12"
edition = "2021"
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
bitflags = {workspace = true }
bytes = { workspace = true }
indoc = { workspace = true }
lazy_static = { workspace = true }
proton-api-core = { workspace = true }
proton-crypto-inbox = { workspace = true }
stash = { workspace = true }
thiserror = "1"
tokio = { workspace = true }
tracing = { workspace = true }
uniffi = { workspace = true, optional = true }

[dev-dependencies]
bytes = "1.6.0"
reqwest = { version = "0.12.2", features = ["stream"] }
tracing-subscriber = { workspace = true }
wiremock = { workspace = true }

[features]
default = []
sql = ["proton-api-core/sql"]
uniffi = ["dep:uniffi", "proton-api-core/uniffi"]

[lints]
workspace = true
