[package]
name = "proton-mail-html-transformer"
version = "0.2.1"
edition.workspace = true

[dependencies]
# kuchikiki requires this verion of html5ever at this time.
html5ever = "=0.26"
kuchikiki = "=0.8.2"
lazy_static = { workspace = true }
thiserror = { workspace = true }
url = { workspace = true }
velcro = { workspace = true }
tracing = { workspace = true }
itertools = { workspace = true }
regex = { workspace = true }
lightningcss = { version = "1.0.0-alpha.65", features = ["visitor", "grid"], default-features = false }
smart-default = { workspace = true }

[lints]
workspace = true

[dev-dependencies]
cpuprofiler = "0.0.4"
criterion = "0.5.1"
insta = { workspace = true }
pprof = { version = "0.13.0", features = ["criterion", "flamegraph"] }
velcro = { workspace = true }
pretty_assertions = { workspace = true }
indoc = { workspace = true }
test-case = { workspace = true }

[[bench]]
name = "parsing_html"
harness = false
