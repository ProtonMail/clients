[package]
name = "proton-mail-common"
version = "0.8.0"
edition = "2021"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
bitflags = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
flume = { workspace = true }
futures = { workspace = true }
indoc = { workspace = true }
itertools = { workspace = true }
html2text = { workspace = true }
lazy_static = { workspace = true }
mime = { workspace = true }
proton-action-queue = { workspace = true }
proton-api-core = { workspace = true }
proton-api-mail = { workspace = true }
proton-core-common = { workspace = true }
proton-crypto-account = { workspace = true }
proton-crypto-inbox = { workspace = true }
proton-event-loop = { workspace = true }
proton-mail-html-transformer = { version = "0.2.0", path = "../mail-html-transformer", registry = "proton" }
proton-sqlite3 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
smart-default = { workspace = true }
stash = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
typed-builder = { workspace = true }
url = { workspace = true }

[dev-dependencies]
clap = { version = "4.5", features = ["derive"] }
ctor = { workspace = true }
color-backtrace = { workspace = true }
insta = { workspace = true }
lazy_static = { workspace = true }
pretty_assertions = { workspace = true }
proton-api-core = { workspace = true }
proton-api-mail = { workspace = true }
secrecy = { version = "0.8", features = ["serde"] }
serde_with = { workspace = true }
tempdir = "0.3.1"
tempfile = "3.10.1"
test-case = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-test = { version = "0.2.4", features = ["no-env-filter"] }
velcro = "0.5.4"
wiremock = { workspace = true }

# not compatible with global clippy configuration yet
# [lints]
# workspace = true

# todo: remove when pedantic-ified and uncommend the [lints] section
[lints.clippy]
# those are also included in "pedantic" and can be removed from here when it's enabled globally
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
mut_mut = "warn"
# pedantic = "deny"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
# Useful to track missing comments on private items/code.
# missing_docs_in_private_items ="warn"
#Disallow `println!`. Use `debug!` for debug output
# (which is provided by the `log` crate).
print_stdout = "warn"
unseparated_literal_suffix = "warn"
wrong_self_convention = "warn"
