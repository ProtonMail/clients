[package]
name = "proton-mail-uniffi"
version = "0.10.26"
edition = "2021"
publish = false

[lib]
crate-type = ["staticlib", "cdylib"]
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
uniffi = { workspace = true }
proton-mail-message-detector = { path = "../proton-mail-message-detector" }
proton-mail-common = { path = "../proton-mail-common", features = ["uniffi"] }
proton-async = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
bytes = {workspace= true}

[lints]
workspace = true
