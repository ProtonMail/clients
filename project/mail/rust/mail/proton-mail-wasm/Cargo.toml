[package]
name = "proton-mail-wasm"
version = "0.1.0"
edition = "2021"
publish = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
proton-mail-message-detector= {path = "../proton-mail-message-detector"}
# We need to overwrite gerandom here to enable the JS feature when compiling for webassebly.
getrandom = {version = "0.2", features = ["js"]}

# not compatible with global clippy configuration yet
# [lints]
# workspace = true

# todo: remove when pedantic-ified and uncommend the [lints] section
[lints.clippy]
# those are also included in "pedantic" and can be removed from here when it's enabled globally
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
mut_mut = "warn"
# pedantic = "deny"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
# Useful to track missing comments on private items/code.
# missing_docs_in_private_items ="warn"
#Disallow `println!`. Use `debug!` for debug output
# (which is provided by the `log` crate).
print_stdout = "warn"
unseparated_literal_suffix = "warn"
wrong_self_convention = "warn"