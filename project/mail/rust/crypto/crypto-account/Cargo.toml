[package]
name = "proton-crypto-account"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-crypto = {path = "../proton-crypto", version = "0.2.0"}
thiserror = "1"
serde = { version="1", features = ["derive"]}
serde_repr = "0.1"
serde_json = "1"
base64 = "0.21"
futures = { version="0.3.30", features = ["async-await"]}

[lints]
workspace = true
