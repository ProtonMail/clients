indoc = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
mail-action-queue = { workspace = true }
mail-api-utils = { workspace = true }
mail-avatar = { workspace = true }
mail-core-api = { workspace = true }
mail-labels-common = { workspace = true }
mail-shared-types = { workspace = true }
mail-sqlite3 = { workspace = true }
mail-stash = { workspace = true }
mail-vcard = { workspace = true }
proton-crypto = { workspace = true }
proton-crypto-account = { workspace = true }
serde = { workspace = true }
sqlite-watcher = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
unicode-segmentation = { workspace = true }
url = { workspace = true }

[dev-dependencies]
