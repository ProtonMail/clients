[package]
name = "mail-api"
version = "0.5.0"
edition.workspace = true
rust-version.workspace = true
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]
license.workspace = true

[dependencies]
bitflags = { workspace = true, features = ["serde"] }
bytes = { workspace = true }
indexmap = { workspace = true }
mail-muon = { workspace = true }
mail-account-api = { workspace = true }
mail-api-utils = { workspace = true }
mail-core-api = { workspace = true }
mail-crypto-inbox = { workspace = true }
mail-task-service = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_repr = { workspace = true }
serde_with = { workspace = true, features = ["base64"] }
smart-default = { workspace = true }
mail-stash = { workspace = true, optional = true }

[dev-dependencies]
bytes = "1.9.0"
mail-core-api = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
test-case = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
wiremock = { workspace = true }
insta = { workspace = true }
mail-core-common = { workspace = true, features = ["test-utils"] }
mail-api = { path = ".", features = ["mocks"] }
mail-log-service = { workspace = true }
tempfile = { workspace = true }
mail-issue-reporter-service = { workspace = true }


[lints]
workspace = true

[features]
default = []
sql = ["dep:mail-stash", "mail-core-api/sql"]
mocks = []
