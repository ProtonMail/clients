[package]
name = "proton-core-common"
version = "0.5.11"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
proton-event-loop = {path = "../proton-event-loop", version = "0.6.13", registry = "proton"}
base64 = {workspace=true}
proton-sqlite3 = {path ="../proton-sqlite3", version = "0.6.2", registry = "proton"}
proton-api-core= {path ="../proton-api-core", version = "0.5.6", features = ["sql"], registry = "proton"}
aes-gcm = {workspace=true}
zeroize = {workspace=true}
uniffi = {workspace=true, optional = true}
secrecy = {workspace=true}
quick_cache.workspace = true

[dev-dependencies]
tempdir = {workspace=true}
wiremock = {workspace=true}

[lints]
workspace = true

[features]
uniffi=["proton-api-core/uniffi", "dep:uniffi", "proton-event-loop/uniffi"]
