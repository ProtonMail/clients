[package]
name = "proton-api-core"
version = "0.2.0"
edition = "2021"
keywords = ["proton", "rest", "api"]
categories = ["api-bindings"]

[dependencies]
thiserror = "1"
serde = {version ="1", features=["derive"]}
serde_repr = "0.1"
serde_json = "1"
base64 = "0.21"
secrecy = "0.8"
anyhow = "1.0"
bytes = "1.4"
tracing = "0.1"
parking_lot = "0.12"
proton-crypto-account = {git="https://gitlab.protontech.ch/rust/proton-crypto-rs.git", default-features = false}
uniffi = {version = "0.26", optional = true, features = ["tokio"]}
proton-sqlite3 = {path = "../proton-sqlite3", optional = true}


[features]
default = []
uniffi = ["dep:uniffi"]
sql =["dep:proton-sqlite3"]

[dependencies.reqwest]
version = "0.11"
default-features = false
features = ["json", "deflate", "stream", "cookies", "multipart", "rustls","rustls-tls", "socks"]

[dev-dependencies]
tokio = {version ="1", features = ["full"]}
tracing-subscriber = { version="0.3", features = ["env-filter"] }

[[example]]
name = "user_id"

[lints]
workspace = true
