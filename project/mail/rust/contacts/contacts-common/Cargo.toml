[package]
name = "mail-contacts-common"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "AGPL-3.0-only"

[dependencies]
async-trait = { workspace = true }
anyhow = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
mail-contacts-api = { workspace = true }
derive_more = { workspace = true, features = ["try_from"] }
flume = { workspace = true }
futures = { workspace = true }
ical = { workspace = true }
include_dir = { workspace = true }
indoc = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
mail-action-queue = { workspace = true }
mail-api-utils = { workspace = true }
mail-local-id = { workspace = true }
mail-avatar = { workspace = true }
mail-core-api = { workspace = true }
mail-shared-types = { workspace = true }
mail-sqlite3 = { workspace = true }
mail-stash = { workspace = true }
mail-vcard = { workspace = true }
proton-crypto = { workspace = true }
proton-crypto-account = { workspace = true, features = ["sql"] }
serde = { workspace = true }
sqlite-watcher = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
unicode-segmentation = { workspace = true }
url = { workspace = true }
core-event-loop = { workspace = true }
mail-issue-reporter-service = { workspace = true }
mail-api-session = { workspace = true }
mail-labels-common = { workspace = true, optional = true }
mail-db-stash = { workspace = true }
contact-database = { workspace = true }
contact-service = { workspace = true }
mail-db = { workspace = true }

[dev-dependencies]
mail-contacts-api = { workspace = true, features = ["mocks"] }
mail-contacts-common = { path = ".", features = ["test-utils"] }
insta = { workspace = true }
mail-api-session = { workspace = true, features = ["mocks"] }
mail-core-api = { workspace = true, features = ["mocks"] }
pretty_assertions = { workspace = true }
proton-crypto-account = { workspace = true, features = ["sql"] }
test-case = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
serde_json = { workspace = true }
wiremock = { workspace = true }

[features]
default = ["sql", "mail-compat"]
sql = ["mail-core-api/sql"]
test-utils = ["dep:mail-labels-common"]
mail-compat = []

[lints]
workspace = true
